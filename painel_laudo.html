<style>
:root {
  --bg-0: #0a0e1a;
  --bg-1: #0f172a;
  --bg-2: #1e293b;
  --bg-3: #334155;
  --line: #1e293b;
  --text-1: #f1f5f9;
  --text-2: #cbd5e1;
  --text-3: #94a3b8;
  --text-4: #64748b;
  --amber: #009FE3;
  --amber-2: #33B5E8;
  --green: #10b981;
  --green-2: #6ee7b7;
  --blue: #3b82f6;
  --red: #ef4444;
  --purple: #a78bfa;
  --yellow: #f59e0b;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg-0); color: var(--text-1); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; overscroll-behavior: none; }
button { cursor: pointer; border: none; background: none; color: inherit; font-family: inherit; }
input, textarea, select { font-family: inherit; }

/* ============ TELA LOGIN ============ */
#tela-login { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; background: linear-gradient(135deg, #0a0e1a 0%, #1e293b 100%); }
.logo-box { text-align: center; margin-bottom: 30px; }
.logo-jp { width: 110px; height: 110px; background: #fff; border-radius: 22px; display: inline-flex; align-items: center; justify-content: center; padding: 8px; margin-bottom: 16px; box-shadow: 0 10px 40px rgba(0,159,227,.4); }
.logo-jp svg { width: 100%; height: 100%; }
.logo-titulo { font-family: 'Oswald'; font-size: 28px; font-weight: 700; letter-spacing: 4px; color: var(--text-1); }
.logo-sub { color: var(--text-3); font-size: 13px; letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; }

.lista-laudistas { width: 100%; max-width: 360px; }
.lista-titulo { font-family: 'Oswald'; font-size: 13px; color: var(--text-3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; text-align: center; }
.laudista-card { background: rgba(30, 41, 59, .7); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; transition: all .15s; cursor: pointer; }
.laudista-card:active { transform: scale(.98); background: rgba(0,159,227, .12); border-color: rgba(0,159,227, .4); }
.laudista-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--amber), var(--amber-2)); display: flex; align-items: center; justify-content: center; font-family: 'Oswald'; font-weight: 700; font-size: 18px; color: #fff; flex-shrink: 0; }
.laudista-nome { font-family: 'Oswald'; font-weight: 600; font-size: 16px; color: var(--text-1); flex: 1; }
.laudista-seta { color: var(--text-4); font-size: 18px; }

.numpad-wrap { width: 100%; max-width: 320px; display: none; }
.numpad-wrap.ativo { display: block; }
.numpad-titulo { font-family: 'Oswald'; font-size: 18px; font-weight: 600; color: var(--text-1); text-align: center; margin-bottom: 6px; }
.numpad-sub { color: var(--text-3); font-size: 12px; text-align: center; margin-bottom: 18px; }
.numpad-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 22px; }
.numpad-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--bg-3); background: transparent; transition: all .15s; }
.numpad-dot.preenchido { background: var(--amber); border-color: var(--amber); box-shadow: 0 0 12px rgba(0,159,227,.5); }
.numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.numpad-key { aspect-ratio: 1; background: rgba(30, 41, 59, .7); border: 1px solid var(--line); border-radius: 14px; font-family: 'Oswald'; font-size: 24px; font-weight: 600; color: var(--text-1); transition: all .1s; }
.numpad-key:active { transform: scale(.92); background: rgba(0,159,227,.18); border-color: var(--amber); }
.numpad-key.acao { font-size: 14px; color: var(--text-3); }
.numpad-back { width: 100%; padding: 12px; font-family: 'Oswald'; font-size: 13px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; }

/* ============ TELA APP (pós-login) ============ */
#tela-app { display: none; min-height: 100vh; padding-bottom: 24px; }
#tela-app.ativo { display: block; }

.app-header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 14px 18px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; }
.app-header .logo-mini { width: 36px; height: 36px; background: #fff; border-radius: 10px; padding: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.app-header .logo-mini svg { width: 100%; height: 100%; }
.app-header .info { flex: 1; }
.app-header .info .titulo { font-family: 'Oswald'; font-size: 14px; font-weight: 600; color: var(--text-1); letter-spacing: 1.5px; }
.app-header .info .sub { font-size: 10px; color: var(--text-3); letter-spacing: 1px; margin-top: 1px; }
.app-header .versao-badge { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--amber-2); background: rgba(51,181,232,.12); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(51,181,232,.3); }
.app-header .laudista-info { background: rgba(0,159,227,.1); border: 1px solid rgba(0,159,227,.25); border-radius: 10px; padding: 6px 10px; font-family: 'Oswald'; font-size: 12px; color: var(--amber-2); font-weight: 600; }

.app-conteudo { padding: 16px 14px; }

/* Sub-header de cada tela */
.tela-titulo { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.tela-titulo .btn-voltar { width: 36px; height: 36px; border-radius: 10px; background: var(--bg-2); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-2); }
.tela-titulo .btn-voltar:active { background: var(--bg-3); }
.tela-titulo h1 { font-family: 'Oswald'; font-size: 18px; font-weight: 600; color: var(--text-1); letter-spacing: 1px; flex: 1; }

/* ============ ABAS / FILTROS ============ */
.abas-wrap { display: flex; gap: 6px; margin-bottom: 14px; background: var(--bg-1); padding: 4px; border-radius: 12px; border: 1px solid var(--line); }
.aba-btn { flex: 1; padding: 10px 8px; font-family: 'Oswald'; font-size: 12px; font-weight: 600; color: var(--text-3); border-radius: 8px; text-align: center; transition: all .15s; letter-spacing: .5px; }
.aba-btn.ativa { background: linear-gradient(135deg, var(--amber), var(--amber-2)); color: #fff; box-shadow: 0 4px 14px rgba(0,159,227,.3); }

.filtro-busca { background: var(--bg-1); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; }
.filtro-busca input { width: 100%; background: transparent; border: none; color: var(--text-1); font-size: 14px; padding: 4px 0; outline: none; }
.filtro-busca input::placeholder { color: var(--text-4); }

/* ============ LISTA DE PEDIDOS ============ */
.pedido-card { background: rgba(30, 41, 59, .7); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 10px; transition: all .15s; cursor: pointer; }
.pedido-card:active { transform: scale(.98); }
.pedido-card.laudado { border-color: rgba(16, 185, 129, .3); background: rgba(16, 185, 129, .05); }
.pedido-card.pendente { border-color: rgba(245, 158, 11, .3); }

.pedido-topo { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.pedido-codigo { font-family: 'Oswald'; font-size: 16px; font-weight: 700; color: var(--text-1); letter-spacing: 1px; }
.pedido-cliente { font-size: 11px; color: var(--text-3); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
.pedido-numped { font-size: 12px; color: var(--amber); margin-top: 4px; font-weight: 700; }

.tag { font-family: 'Oswald'; font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 6px; letter-spacing: 1px; text-transform: uppercase; }
.tag.pendente { background: rgba(245, 158, 11, .15); color: var(--yellow); border: 1px solid rgba(245, 158, 11, .3); }
.tag.laudado { background: rgba(16, 185, 129, .15); color: var(--green); border: 1px solid rgba(16, 185, 129, .3); }
.tag.em-progresso { background: rgba(59, 130, 246, .15); color: var(--blue); border: 1px solid rgba(59, 130, 246, .3); }

.pedido-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-top: 10px; border-top: 1px solid var(--line); }
.pedido-info-item { font-size: 11px; }
.pedido-info-item .label { color: var(--text-4); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.pedido-info-item .valor { color: var(--text-2); font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 500; }

.pedido-testes-count { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 8px; }
.pedido-testes-dots { display: flex; gap: 4px; }
.pedido-testes-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--bg-3); }
.pedido-testes-dot.feito { background: var(--green); border-color: var(--green); }
.pedido-testes-label { font-size: 11px; color: var(--text-3); font-family: 'JetBrains Mono'; }

/* ============ TELA DETALHE DO PEDIDO ============ */
.detalhe-bloco { background: rgba(30, 41, 59, .7); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.detalhe-bloco-titulo { font-family: 'Oswald'; font-size: 13px; color: var(--amber-2); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }

.detalhe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.detalhe-item { }
.detalhe-item.full { grid-column: 1 / -1; }
.detalhe-item .label { font-size: 10px; color: var(--text-4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.detalhe-item .valor { font-family: 'JetBrains Mono'; font-size: 14px; color: var(--text-1); font-weight: 500; }

.teste-card { background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.teste-card-topo { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.teste-card-num { font-family: 'Oswald'; font-size: 13px; font-weight: 700; color: var(--amber-2); letter-spacing: 1px; }
.teste-card-data { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-4); }
.teste-card-valores { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.teste-card-valor { text-align: center; }
.teste-card-valor .v { font-family: 'JetBrains Mono'; font-size: 14px; color: var(--text-1); font-weight: 600; }
.teste-card-valor .l { font-size: 9px; color: var(--text-4); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

.btn-grande { width: 100%; padding: 16px; border-radius: 14px; font-family: 'Oswald'; font-size: 16px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all .15s; margin-bottom: 10px; cursor: pointer; }
.btn-grande:active { transform: scale(.98); }
.btn-primary { background: linear-gradient(135deg, var(--amber), var(--amber-2)); color: #fff; box-shadow: 0 4px 14px rgba(0,159,227,.35); }
.btn-success { background: linear-gradient(135deg, #059669, #10b981); color: #fff; box-shadow: 0 4px 14px rgba(16,185,129,.35); }
.btn-warning { background: linear-gradient(135deg, #d97706, #f59e0b); color: #fff; box-shadow: 0 4px 14px rgba(245,158,11,.35); }
.btn-secondary { background: var(--bg-2); border: 1px solid var(--line); color: var(--text-2); }
.btn-secondary:active { background: var(--bg-3); }
.btn-grande:disabled { opacity: .4; cursor: not-allowed; }

/* ============ FORMULÁRIOS ============ */
.form-grupo { margin-bottom: 14px; }
.form-grupo label { display: block; font-family: 'Oswald'; font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.form-grupo label .req { color: var(--red); margin-left: 4px; }
.form-grupo input, .form-grupo textarea, .form-grupo select { width: 100%; background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-size: 16px; color: var(--text-1); transition: all .15s; outline: none; -webkit-appearance: none; }
.form-grupo input:focus, .form-grupo textarea:focus, .form-grupo select:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(0,159,227,.15); }
.form-grupo input::placeholder, .form-grupo textarea::placeholder { color: var(--text-4); }
.form-grupo textarea { resize: vertical; min-height: 80px; font-family: inherit; }
.form-grupo .help { font-size: 11px; color: var(--text-4); margin-top: 4px; font-family: 'JetBrains Mono'; }
.form-grupo.com-valor-esperado .help { color: var(--amber-2); }

.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ============ MODAL / OVERLAY ============ */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.overlay.ativo { display: flex; }
.modal { background: var(--bg-1); border: 1px solid var(--line); border-radius: 16px; padding: 22px; width: 100%; max-width: 380px; max-height: 88vh; overflow-y: auto; }
.modal-titulo { font-family: 'Oswald'; font-size: 18px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; letter-spacing: 1px; }
.modal-sub { font-size: 12px; color: var(--text-3); margin-bottom: 16px; }

/* ============ TOAST ============ */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120%); background: var(--bg-2); border: 1px solid var(--line); border-radius: 12px; padding: 14px 22px; font-family: 'Oswald'; font-weight: 500; color: var(--text-1); z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,.5); transition: transform .3s; max-width: 90%; }
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { border-color: var(--green); color: var(--green-2); }
#toast.error { border-color: var(--red); color: #fca5a5; }
#toast.info { border-color: var(--amber); color: var(--amber-2); }

/* ============ LOADING ============ */
.spinner { border: 3px solid rgba(255,255,255,.1); border-top-color: var(--amber); border-radius: 50%; width: 24px; height: 24px; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-tela { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-3); gap: 16px; }
.empty-tela { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-4); gap: 12px; text-align: center; }
.empty-tela .icone { font-size: 48px; opacity: .5; }
.empty-tela .titulo { font-family: 'Oswald'; font-size: 16px; color: var(--text-3); }
.empty-tela .sub { font-size: 12px; color: var(--text-4); max-width: 260px; }

/* ============ STATUS SINCRONIA ============ */
#sinc-bar { font-size: 10px; color: var(--text-4); font-family: 'JetBrains Mono'; padding: 4px 18px; background: var(--bg-1); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 6px; }
#sinc-bar.online { color: var(--green); }
#sinc-bar.offline { color: var(--red); }

/* ============ LAUDO PDF PREVIEW ============ */
#laudo-preview { background: #fff; color: #000; padding: 28px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 210mm; margin: 0 auto; }

/* Pulse animation */
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(0,159,227,.4); } 50% { box-shadow: 0 0 0 12px rgba(0,159,227,0); } }
.pulse { animation: pulse 1.5s infinite; }
</style>

    // v2.9.0 — Camada 1: cache offline (sincroniza sozinho quando a internet volta)
    try { db.enablePersistence({ synchronizeTabs: true }).catch(function(){}); } catch(e){}
    setSincStatus('online', '✓ Conectado');
    return true;
  } catch (e) {
    console.error('Erro Firebase:', e);
    setSincStatus('offline', '✗ Offline');
    return false;
  }
}

// ============ UTILITÁRIOS ============
function $(id) { return document.getElementById(id); }
function toast(msg, tipo = 'info', dur = 2500) {
  const t = $('toast');
  t.textContent = msg;
  t.className = tipo + ' show';
  setTimeout(() => { t.className = ''; }, dur);
}
function fmtData(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}
function fmtDataCurta(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('pt-BR');
}
function iniciais(nome) {
  if (!nome) return '?';
  return nome.split(' ').slice(0, 2).map(s => s[0]).join('').toUpperCase();
}
function num(v, casas = 2) {
  if (v === null || v === undefined || v === '') return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  return n.toFixed(casas).replace('.', ',');
}
function dentroTolerancia(esperado, encontrado, tol) {
  if (!esperado || !encontrado) return null;
  const e = parseFloat(esperado), f = parseFloat(encontrado);
  if (isNaN(e) || isNaN(f)) return null;
  const desvio = Math.abs(e - f) / e;
  return desvio <= tol;
}

// ============ CARREGAR DADOS DO FIREBASE ============
async function carregarDados() {
  if (!db) { toast('Sem conexão', 'error'); return; }
  try {
    setSincStatus('online', '⏳ Carregando...');
    const [laudistasDoc, pedidosDoc, caixasDoc, papeisDoc, laudosDoc, configDoc] = await Promise.all([
      db.collection('jp_sistema').doc('laudistas').get(),
      db.collection('jp_sistema').doc('pedidos_operador').get(),
      db.collection('jp_sistema').doc('caixas').get(),
      db.collection('jp_sistema').doc('papeis').get(),
      db.collection('jp_sistema').doc('laudos').get(),
      db.collection('jp_sistema').doc('config').get()
    ]);
    STATE.laudistas = laudistasDoc.exists ? (laudistasDoc.data().laudistas || []) : [];
    STATE.pedidos = pedidosDoc.exists ? (pedidosDoc.data().pedidos || []) : [];
    STATE.caixas = caixasDoc.exists ? (caixasDoc.data().caixas || []) : [];
    STATE.papeis = papeisDoc.exists ? (papeisDoc.data().papeis || []) : [];
    STATE.laudos = laudosDoc.exists ? (laudosDoc.data().laudos || []) : [];
    // Clientes podem estar em config ou separado
    if (configDoc.exists) {
      STATE.clientes = configDoc.data().clientes || [];
    }
    setSincStatus('online', '✓ Conectado · ' + STATE.pedidos.length + ' pedidos');
    renderLaudistasLogin();

    // Listener em tempo real para laudos (pra atualizar quando outro laudista alterar)
    db.collection('jp_sistema').doc('laudos').onSnapshot(d => {
      if (d.exists && d.data().laudos) {
        STATE.laudos = d.data().laudos;
        if (STATE.tela === 'lista') renderListaPedidos();
        if (STATE.tela === 'detalhe' && STATE.pedidoAtual) abrirDetalhePedido(STATE.pedidoAtual);
      }
    });
    db.collection('jp_sistema').doc('pedidos_operador').onSnapshot(d => {
      if (d.exists && d.data().pedidos) {
        STATE.pedidos = d.data().pedidos;
        if (STATE.tela === 'lista') renderListaPedidos();
      }
    });
  } catch (e) {
    console.error('Erro carregar:', e);
    setSincStatus('offline', '✗ Erro ao carregar');
    toast('Erro ao carregar dados', 'error');
  }
}

// ============ SALVAR LAUDO ============
async function salvarLaudo(laudo) {
  if (!db) { toast('Sem conexão', 'error'); return false; }
  try {
    // Atualiza ou insere na lista
    const idx = STATE.laudos.findIndex(l => l.pedidoId === laudo.pedidoId);
    if (idx >= 0) STATE.laudos[idx] = laudo;
    else STATE.laudos.push(laudo);

    await db.collection('jp_sistema').doc('laudos').set({
      laudos: STATE.laudos,
      atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
    });
    return true;
  } catch (e) {
    console.error('Erro salvar laudo:', e);
    toast('Erro ao salvar', 'error');
    return false;
  }
}

function getLaudoDoPedido(pedidoId) {
  return STATE.laudos.find(l => l.pedidoId === pedidoId) || null;
}
function getCaixaPorCodigo(codigo) {
  return STATE.caixas.find(c => c.codigo === codigo) || null;
}
// Número do pedido (etiqueta) — vem do _numPed ou da obs "Ped 12345"
function numPedDe(p) {
  if (!p) return '';
  if (p._numPed) return String(p._numPed);
  const m = (p.obs || '').match(/Ped\s+(\d+)/i);
  return m ? m[1] : '';
}

// v1.9.7 — Monta linha de cores de impressão (bolinhas coloridas) para o laudo
function corLaudoHTML(caixa) {
  if (!caixa) return '';
  const cores = [];
  for (let i = 1; i <= 4; i++) {
    const rgb = caixa['cor' + i + 'Rgb'];
    const nome = caixa['cor' + i + 'Nome'];
    if (rgb) cores.push({ rgb, nome: nome || '' });
  }
  if (!cores.length) return '';
  const bolinhas = cores.map(c =>
    `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px">
       <span style="width:13px;height:13px;border-radius:50%;background:${c.rgb};border:1px solid #999;display:inline-block"></span>
       <span style="font-size:11px">${c.nome || c.rgb}</span>
     </span>`
  ).join('');
  return `<tr>
    <td style="padding:4px 6px;color:#666;vertical-align:top">Cores impressão (${cores.length})</td>
    <td style="padding:4px 6px">${bolinhas}</td>
  </tr>`;
}

// v1.9.7 — Dados de produção vindos do operador (qtd produzida, paletes, material)
function getDadosProducao(pedido) {
  const registros = pedido.registros || [];
  // Qtd produzida = soma dos registros do operador (fallback: campos diretos)
  let qtdProduzida = registros.reduce((s, r) => s + (+r.qtd || 0), 0);
  if (!qtdProduzida) qtdProduzida = +pedido.qtdProduzido || +pedido.qtdRealizada || 0;

  // Paletes: tenta consolidar dos registros; fallback para campos diretos do pedido
  let totalPaletes = 0, cxPalete = 0;
  registros.forEach(r => {
    if (Array.isArray(r.paletes)) totalPaletes += r.paletes.length;
    else if (+r.totalPaletes) totalPaletes += +r.totalPaletes;
    if (!cxPalete && +r.cxPalete) cxPalete = +r.cxPalete;
  });
  if (!totalPaletes) totalPaletes = +pedido.totalPaletes || 0;
  if (!cxPalete) cxPalete = +pedido.cxPalete || 0;

  // Material disponível (chapa lançada pelo operador)
  const qtdChapa = +pedido.chapasDisponiveis || 0;

  return { qtdProduzida, totalPaletes, cxPalete, qtdChapa };
}
function getStatusLaudo(pedido) {
  const laudo = getLaudoDoPedido(pedido.id);
  if (!laudo) return 'pendente';
  if (laudo.finalizado) return 'laudado';
  if (laudo.testes && laudo.testes.length > 0) return 'em-progresso';
  return 'pendente';
}
function pedidoDevemAparecer(pedido) {
  // Mostra os pedidos que já foram pelo menos programados (usa statusOp do sistema)
  // v1.9.6 — Fix: era pedido.status (errado), agora é pedido.statusOp (igual operador)
  const statusValidos = ['programado', 'em_producao', 'finalizado', 'parcial', 'em-producao'];
  const s = pedido.statusOp || pedido.status; // fallback caso pedido antigo
  return statusValidos.includes(s);
}

function renderCardsPedidos() {
  const cont = $('lista-pedidos-cont');
  let pedidos = STATE.pedidos.filter(pedidoDevemAparecer);
  // Filtro de status
  if (STATE.filtroStatus !== 'todos') {
    pedidos = pedidos.filter(p => getStatusLaudo(p) === STATE.filtroStatus);
  }
  // Filtro de busca
  if (STATE.filtroBusca) {
    const q = STATE.filtroBusca;
    pedidos = pedidos.filter(p => (
      (p.cliente || '').toLowerCase().includes(q) ||
      (p.codigo || '').toLowerCase().includes(q) ||
      (p.caixaCodigo || '').toLowerCase().includes(q) ||
      (p.caixaDescricao || '').toLowerCase().includes(q)
    ));
  }
  // Ordenação: pendentes primeiro, depois em-progresso, depois laudados; dentro disso por data
  pedidos.sort((a, b) => {
    const sa = getStatusLaudo(a), sb = getStatusLaudo(b);
    const ord = { 'em-progresso': 0, 'pendente': 1, 'laudado': 2 };
    if (ord[sa] !== ord[sb]) return ord[sa] - ord[sb];
    const da = a.dataEntrega || a.data || '';
    const db_ = b.dataEntrega || b.data || '';
    return String(da).localeCompare(String(db_));
  });

  if (pedidos.length === 0) {
    cont.innerHTML = `<div class="empty-tela">
      <div class="icone">📋</div>
      <div class="titulo">Nenhum pedido encontrado</div>
      <div class="sub">Tente mudar o filtro acima ou aguardar novos pedidos.</div>
    </div>`;
    return;
  }

  cont.innerHTML = pedidos.map(p => {
    const status = getStatusLaudo(p);
    const laudo = getLaudoDoPedido(p.id);
    const nTestes = laudo && laudo.testes ? laudo.testes.length : 0;
    const tagClass = status === 'laudado' ? 'laudado' : (status === 'em-progresso' ? 'em-progresso' : 'pendente');
    const tagTxt = status === 'laudado' ? '✓ Laudado' : (status === 'em-progresso' ? `⏳ ${nTestes}/${MAX_TESTES} testes` : '⚠ Pendente');
    return `
      <div class="pedido-card ${status}" data-id="${p.id}">
        <div class="pedido-topo">
          <div>
            <div class="pedido-codigo">${p.caixaCodigo || p.codigo || 'SEM CÓDIGO'}</div>
            <div class="pedido-cliente">${p.cliente || '—'}</div>
            ${numPedDe(p) ? `<div class="pedido-numped">📦 Pedido ${numPedDe(p)}</div>` : ''}
          </div>
          <div class="tag ${tagClass}">${tagTxt}</div>
        </div>
        <div class="pedido-info">
          <div class="pedido-info-item">
            <div class="label">Qtd Pedido</div>
            <div class="valor">${(p.qtdPedido || p.quantidade || 0).toLocaleString('pt-BR')} cx</div>
          </div>
          <div class="pedido-info-item">
            <div class="label">Entrega</div>
            <div class="valor">${p.dataEntrega || '—'}</div>
          </div>
        </div>
        <div class="pedido-testes-count">
          <div class="pedido-testes-dots">
            ${[0, 1, 2].map(i => `<div class="pedido-testes-dot ${i < nTestes ? 'feito' : ''}"></div>`).join('')}
          </div>
          <div class="pedido-testes-label">${nTestes} de ${MAX_TESTES} testes feitos</div>
        </div>
      </div>
    `;
  }).join('');

  document.querySelectorAll('.pedido-card').forEach(c => {
    c.addEventListener('click', () => {
      const p = STATE.pedidos.find(p => p.id === c.dataset.id);
      if (p) abrirDetalhePedido(p);
    });
  });
}

async function salvarNovoTeste(pedido) {
  const qtd = parseFloat($('inp-qtd').value);
  const gramatura = parseFloat($('inp-gramatura').value);
  const coluna = parseFloat($('inp-coluna').value);

  if (!qtd || qtd <= 0) { toast('Informe a quantidade de chapa', 'error'); return; }
  if (!gramatura || gramatura <= 0) { toast('Informe a gramatura', 'error'); return; }
  if (!coluna || coluna <= 0) { toast('Informe a coluna', 'error'); return; }

  const btn = $('btn-salvar-teste');
  btn.disabled = true;
  btn.innerHTML = '⏳ Salvando...';

  let laudo = getLaudoDoPedido(pedido.id);
  if (!laudo) {
    laudo = {
      pedidoId: pedido.id,
      cliente: pedido.cliente,
      caixaCodigo: pedido.caixaCodigo,
      caixaDescricao: pedido.caixaDescricao || '',
      testes: [],
      finalizado: false,
      criadoEm: new Date().toISOString()
    };
  }
  laudo.testes.push({
    qtdChapa: qtd,
    gramatura: gramatura,
    coluna: coluna,
    data: new Date().toISOString(),
    laudista: STATE.laudistaLogado.nome
  });
  laudo.atualizadoEm = new Date().toISOString();

  const ok = await salvarLaudo(laudo);
  if (ok) {
    toast('Teste #' + laudo.testes.length + ' salvo!', 'success');
    setTimeout(() => abrirDetalhePedido(pedido), 600);
  } else {
    btn.disabled = false;
    btn.innerHTML = '💾 Salvar teste';
  }
}

// ============ TELA FINALIZAR LAUDO ============

async function finalizarLaudo(pedido) {
  const nf = $('fin-nf').value.trim();
  if (!nf) { toast('Informe o número da NF', 'error'); return; }

  const f = {
    nf: nf,
    lote: $('fin-lote').value.trim(),
    mullen: parseFloat($('fin-mullen').value) || null,
    espessura: parseFloat($('fin-espessura').value) || null,
    umidade: parseFloat($('fin-umidade').value) || null,
    gramaturaManual: $('fin-gramatura') ? (parseFloat($('fin-gramatura').value) || null) : null,
    colunaManual: $('fin-coluna') ? (parseFloat($('fin-coluna').value) || null) : null,
    observacoes: $('fin-obs').value.trim(),
    email: $('fin-email').value.trim(),
    laudista: STATE.laudistaLogado.nome,
    data: new Date().toISOString()
  };

  const btn = $('btn-finalizar-laudo');
  btn.disabled = true;
  btn.innerHTML = '⏳ Finalizando...';

  let laudo = getLaudoDoPedido(pedido.id);
  laudo.finalizacao = f;
  laudo.finalizado = true;
  laudo.atualizadoEm = new Date().toISOString();

  const ok = await salvarLaudo(laudo);
  if (ok) {
    toast('Laudo finalizado!', 'success');
    setTimeout(() => abrirLaudoGerado(pedido), 700);
  } else {
    btn.disabled = false;
    btn.innerHTML = '✅ Finalizar e gerar laudo';
  }
}

async function reabrirLaudo(pedido) {
  abrirModal(`
    <div class="modal-titulo">Reabrir laudo?</div>
    <div class="modal-sub">O laudo deste pedido vai voltar pra edição. Os testes e dados continuam salvos, mas o PDF terá que ser gerado de novo.</div>
    <button class="btn-grande btn-warning" id="btn-confirm-reabrir">⚠ Reabrir laudo</button>
    <button class="btn-grande btn-secondary" id="btn-cancel-reabrir">Cancelar</button>
  `);
  $('btn-confirm-reabrir').addEventListener('click', async () => {
    let laudo = getLaudoDoPedido(pedido.id);
    if (laudo) {
      laudo.finalizado = false;
      laudo.atualizadoEm = new Date().toISOString();
      const ok = await salvarLaudo(laudo);
      if (ok) {
        toast('Laudo reaberto', 'info');
        fecharModal();
        setTimeout(() => abrirTelaFinalizar(pedido), 400);
      }
    }
  });
  $('btn-cancel-reabrir').addEventListener('click', fecharModal);
}

  STATE.tela = 'laudo-gerado';
  const laudo = getLaudoDoPedido(pedido.id);
  if (!laudo || !laudo.finalizado) {
    toast('Laudo ainda não finalizado', 'error');
    return;
  }

  const caixa = getCaixaPorCodigo(pedido.caixaCodigo);
  const compChapa = caixa?.composicaoChapa || {};
  const gramaturaEsp = compChapa.gramaturaTotal || caixa?.gramatura;

  const mediaColuna = temTeste
    ? testes.reduce((s, t) => s + (t.coluna || 0), 0) / testes.length

// ============ GERAÇÃO DE PDF ============
async function gerarPDFBlob(pedido, numLaudo) {
  const el = $('laudo-preview');
  if (!el) return null;
  const opt = {
    margin: [10, 10, 10, 10],
    filename: `Laudo_${numLaudo}_${(pedido.cliente || 'cliente').replace(/\s+/g, '_')}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  return await html2pdf().set(opt).from(el).outputPdf('blob');
}

async function baixarPDF(pedido, numLaudo) {
  toast('Gerando PDF...', 'info');
  const el = $('laudo-preview');
  const opt = {
    margin: [10, 10, 10, 10],
    filename: `Laudo_${numLaudo}_${(pedido.cliente || 'cliente').replace(/\s+/g, '_')}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  try {
    await html2pdf().set(opt).from(el).save();
    toast('PDF baixado!', 'success');
  } catch (e) {
    console.error(e);
    toast('Erro ao gerar PDF', 'error');
  }
}

async function enviarWhatsApp(pedido, numLaudo) {
  // Primeiro gera o PDF
  toast('Gerando PDF para WhatsApp...', 'info');
  try {
    const el = $('laudo-preview');
    const opt = {
      margin: [10, 10, 10, 10],
      filename: `Laudo_${numLaudo}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    // Baixa o PDF (usuário anexa no whatsapp manualmente)
    await html2pdf().set(opt).from(el).save();

    const msg = `🏭 *JP EMBALAGENS*\n\nLaudo Técnico Nº ${numLaudo}\nCliente: ${pedido.cliente}\n${numPedDe(pedido) ? `Pedido: ${numPedDe(pedido)}\n` : ''}Caixa: ${pedido.caixaCodigo}\nNF: ${getLaudoDoPedido(pedido.id).finalizacao.nf}\n\nSegue em anexo o laudo técnico de qualidade do pedido.\n\nAtenciosamente,\nQualidade JP Embalagens`;
    abrirModal(`
      <div class="modal-titulo">📱 Enviar via WhatsApp</div>
      <div class="modal-sub">PDF baixado! Cole o número do cliente e abra o WhatsApp pra anexar o PDF.</div>
      <div class="form-grupo">
        <label>Telefone (com DDD)</label>
        <input id="wa-tel" type="tel" inputmode="numeric" placeholder="Ex: 14999998888">
        <div class="help">Só números, com DDD. Sem +55.</div>
      </div>
      <button class="btn-grande btn-success" id="btn-abrir-wa">📱 Abrir WhatsApp</button>
      <button class="btn-grande btn-secondary" id="btn-cancel-wa">Cancelar</button>
    `);
    $('btn-abrir-wa').addEventListener('click', () => {
      const tel = $('wa-tel').value.replace(/\D/g, '');
      if (!tel) { toast('Informe o telefone', 'error'); return; }
      const numFmt = tel.startsWith('55') ? tel : '55' + tel;
      const url = `https://wa.me/${numFmt}?text=${encodeURIComponent(msg)}`;
      window.open(url, '_blank');
      fecharModal();
    });
    $('btn-cancel-wa').addEventListener('click', fecharModal);
  } catch (e) {
    console.error(e);
    toast('Erro ao gerar PDF', 'error');
  }
}

function imprimirLaudo() {
  const el = $('laudo-preview');
  if (!el) return;
  const w = window.open('', '_blank');
  w.document.write(`
    <!DOCTYPE html><html><head><title>Laudo</title>
    <style>body{margin:0;padding:20px;font-family:Arial,sans-serif}@page{size:A4;margin:10mm}</style>
    </head><body>${el.outerHTML}<script>setTimeout(()=>window.print(),300);<\/script></body></html>
  `);
  w.document.close();
}

function abrirEmail(pedido, email, numLaudo) {
  const subj = `Laudo Técnico Nº ${numLaudo} - JP Embalagens`;
  const body = `Prezado(a) cliente,\n\nSegue em anexo o laudo técnico de qualidade referente ao pedido:\n\nCliente: ${pedido.cliente}\n${numPedDe(pedido) ? `Nº do pedido: ${numPedDe(pedido)}\n` : ''}Código da caixa: ${pedido.caixaCodigo}\nNF: ${getLaudoDoPedido(pedido.id).finalizacao.nf}\n\nQualquer dúvida, estamos à disposição.\n\nAtenciosamente,\nControle de Qualidade\nJP Embalagens`;
  const mailto = `mailto:${email}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
  toast('Baixe o PDF e anexe ao e-mail', 'info', 3500);
}

// ============ INICIALIZAÇÃO ============
async function inicializar() {
  const ok = initFirebase();
  if (!ok) {
    toast('Sem conexão com o servidor', 'error');
    return;
  }
  await carregarDados();

  // v1.9.6 — Restaurar sessão salva (com check de 12h)
  try {
    const sStr = localStorage.getItem('jp_laudo_sessao');
    if(sStr){
      const s = JSON.parse(sStr);
      if(s && s.laudista && s.desde){
        const horasDesde = (Date.now() - new Date(s.desde).getTime()) / 3600000;
        if(horasDesde <= 12){
          // Confirma se o laudista ainda existe no cadastro
          const ainda = STATE.laudistas.find(l => l.nome === s.laudista.nome && l.senha === s.laudista.senha);
          if(ainda){
            STATE.laudistaLogado = ainda;
            entrarApp();
          } else {
            localStorage.removeItem('jp_laudo_sessao');
          }
        } else {
          localStorage.removeItem('jp_laudo_sessao');
        }
      }
    }
  } catch(e){ localStorage.removeItem('jp_laudo_sessao'); }
}

// Versão badge clicável (logout / sobre)
document.addEventListener('click', (e) => {
  if (e.target.id === 'laudista-logado-info' && STATE.laudistaLogado) {
    abrirModal(`
      <div class="modal-titulo">${STATE.laudistaLogado.nome}</div>
      <div class="modal-sub">Laudista logado · JP Laudo ${VERSAO}</div>
      <button class="btn-grande btn-warning" id="btn-logout">🚪 Sair</button>
      <button class="btn-grande btn-secondary" id="btn-cancel-logout">Cancelar</button>
    `);
    $('btn-logout').addEventListener('click', () => { fecharModal(); logout(); });
    $('btn-cancel-logout').addEventListener('click', fecharModal);
  }
});

// Inicia tudo
inicializar();
</script>

<!-- v2.9.0 - Camada 3: aviso de status de conexao (offline/online) -->
<script>
(function(){
  var bar, hideT;
  function ensureBar(){
    if(bar) return bar;
    bar = document.createElement('div');
    bar.id = 'jp-net-bar';
    bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:2147483647;text-align:center;font:600 12px/1.45 Inter,Outfit,Arial,sans-serif;padding:7px 12px;transform:translateY(-110%);transition:transform .35s ease;box-shadow:0 2px 12px rgba(0,0,0,.35);letter-spacing:.2px';
    (document.body||document.documentElement).appendChild(bar);
    return bar;
  }
  function show(html,bg,color){ var b=ensureBar(); clearTimeout(hideT); b.innerHTML=html; b.style.background=bg; b.style.color=color; b.style.transform='translateY(0)'; }
  function hide(){ if(bar){ clearTimeout(hideT); bar.style.transform='translateY(-110%)'; } }
  function offline(){ show('\u{1F7E1} Sem internet — salvando no aparelho, sincroniza quando voltar','#f59e0b','#1a1200'); }
  function online(){ show('✅ Reconectado, sincronizando...','linear-gradient(90deg,#00668E,#009FE3)','#fff'); hideT=setTimeout(hide,2600); }
  function init(){ if(navigator.onLine===false) offline(); }
  window.addEventListener('offline', offline);
  window.addEventListener('online', online);
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
