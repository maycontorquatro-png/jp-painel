<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#009FE3">
<meta name="mobile-web-app-capable" content="yes">
<title>JP · App do Vendedor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0a0e1a; --bg-1:#111726; --bg-2:#1a2336; --bg-3:#222d44;
  --line:#2a3550; --text-1:#eef2f9; --text-2:#c2cce0; --text-3:#8d9bb8; --text-4:#5e6c88;
  --blue:#009FE3; --blue-2:#33B5E8; --green:#10b981; --green-2:#6ee7b7;
  --amber:#f59e0b; --amber-2:#fbbf24; --red:#ef4444; --red-2:#fca5a5;
  --purple:#a855f7; --purple-2:#c084fc; --orange:#f97316; --orange-2:#fb923c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg-0);color:var(--text-1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overscroll-behavior:none}
.screen{display:none;min-height:100vh;min-height:100dvh}
.screen.active{display:block}
h1,h2,h3{font-family:'Oswald',sans-serif;margin:0}
.mono{font-family:'JetBrains Mono',monospace}
.btn{border:none;border-radius:10px;padding:12px 14px;font-size:15px;font-weight:700;cursor:pointer;color:#fff;background:var(--bg-2);transition:transform .1s}
.btn:active{transform:scale(.96)}
.btn-blue{background:linear-gradient(135deg,#009FE3,#33B5E8);color:#fff}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-ghost{background:var(--bg-2);color:var(--text-2);border:1px solid var(--line)}

/* LOGIN */
#screen-login{padding:0;min-height:100vh;background:linear-gradient(135deg,#0a0e1a 0%,#1e293b 100%)}
.login-top{padding:48px 20px 20px;padding-top:max(48px,env(safe-area-inset-top));text-align:center}
.login-jp{width:96px;height:96px;background:#fff;border-radius:22px;display:inline-flex;align-items:center;justify-content:center;padding:8px;margin-bottom:14px;box-shadow:0 10px 40px rgba(0,159,227,.4)}
.login-jp svg{width:100%;height:100%}
.login-top h1{font-size:26px;font-weight:700;color:#e7ebf2;margin:0;letter-spacing:4px}
.login-cx{font-size:12px;color:#009FE3;letter-spacing:5px;margin-top:2px}
.login-top p{color:var(--text-3);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:8px 0 0}
.login-body{padding:18px}
.mot-item{display:flex;align-items:center;gap:12px;background:var(--bg-1);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer}
.mot-item:active{background:var(--bg-2)}
.mot-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#009FE3,#33B5E8);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mot-item .nm{font-weight:700;font-size:16px}
.mot-item .sb{font-size:12px;color:var(--text-4)}
.cn-x{flex-shrink:0;background:transparent;border:none;color:var(--text-4);font-size:15px;cursor:pointer;padding:6px 8px;border-radius:8px}
.cn-x:active{background:rgba(239,68,68,.18);color:#fca5a5}
.login-input{width:100%;background:var(--bg-1);border:1px solid var(--line);border-radius:12px;padding:14px;color:var(--text-1);font-size:16px;font-family:inherit;margin-bottom:12px}
.login-input::placeholder{color:var(--text-4)}
/* PIN */
#pin-step{display:none;padding:18px;text-align:center}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:18px 0 24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--blue-2);background:transparent}
.pin-dot.on{background:var(--blue-2)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:300px;margin:0 auto}
.numpad button{aspect-ratio:1;border-radius:50%;border:1px solid var(--line);background:var(--bg-1);color:var(--text-1);font-size:24px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono'}
.numpad button:active{background:var(--bg-2)}

/* APP */
.app-head{background:linear-gradient(135deg,#00668E,#009FE3);padding:16px 16px 14px;padding-top:max(16px,env(safe-area-inset-top));display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.app-head .av{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px}
.app-head .nm{font-weight:700;font-size:17px;color:#fff;line-height:1.1}
.app-head .sb{font-size:11px;color:rgba(255,255,255,.8)}
.app-head .sair{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer}
.wrap{padding:14px;max-width:560px;margin:0 auto;padding-bottom:40px}
.toolbar{display:flex;gap:8px;margin-bottom:14px}
.busca{flex:1;background:var(--bg-1);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--text-1);font-size:14px;font-family:inherit}
.busca::placeholder{color:var(--text-4)}
.btn-novo{flex-shrink:0;display:flex;align-items:center;gap:6px;white-space:nowrap;padding:11px 14px;font-size:14px}

.cli{background:var(--bg-1);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.cli-head{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer}
.cli-head:active{background:var(--bg-2)}
.cli-av{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#009FE3,#33B5E8);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-family:'Oswald';font-weight:700;color:#fff}
.cli-nm{font-family:'Oswald';font-size:16px;font-weight:700;line-height:1.15}
.cli-sb{font-size:11px;color:var(--text-4);margin-top:2px}
.cli-cnt{margin-left:auto;font-family:'JetBrains Mono';font-size:13px;font-weight:700;color:var(--blue-2);background:rgba(0,159,227,.12);padding:3px 10px;border-radius:20px;flex-shrink:0}
.cli-seta{color:var(--text-4);font-size:13px;flex-shrink:0;transition:transform .2s}
.cli.aberto .cli-seta{transform:rotate(90deg)}
.cli-body{display:none;padding:0 14px 14px}
.cli.aberto .cli-body{display:block}
.cli-dados{background:var(--bg-2);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:10px;font-size:13px}
.cd-ln{display:flex;gap:7px;align-items:flex-start;color:var(--text-2);margin-bottom:5px;line-height:1.35}
.cd-ln:last-child{margin-bottom:0}
.cd-ln span{flex:1;min-width:0;word-break:break-word}

.fase-grp{margin-top:12px}
.fase-tit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 10px;border-radius:7px;display:inline-block;margin-bottom:8px}
.ped{background:var(--bg-2);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:8px}
.ped-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ped-num{font-family:'Oswald';font-size:15px;font-weight:700}
.ped-num small{font-weight:400;color:var(--text-4);font-size:12px;font-family:inherit}
.ped-meta{font-size:12px;color:var(--text-3);margin-top:4px;display:flex;flex-wrap:wrap;gap:4px 12px}
.ped-pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.empty{text-align:center;color:var(--text-3);padding:50px 20px}
.empty .i{font-size:48px}

/* ABAS */
.tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--bg-1);border:1px solid var(--line);border-radius:12px;padding:4px}
.tab{flex:1;background:transparent;border:none;color:var(--text-3);font-family:inherit;font-size:13px;font-weight:700;padding:9px 8px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.ativo{background:linear-gradient(135deg,#009FE3,#33B5E8);color:#fff}
.tab-badge{font-family:'JetBrains Mono';font-size:11px;background:rgba(255,255,255,.25);padding:1px 7px;border-radius:20px}
.orcc{background:var(--bg-1);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.orcc-tit{font-family:'Oswald';font-size:16px;font-weight:700}
.orcc-st{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.orcc-item{background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-top:7px;font-size:13px}
.orcc-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
/* estimativa de preço (maleta) */
.est-box{background:rgba(0,159,227,.10);border:1px solid rgba(0,159,227,.28);border-radius:10px;padding:9px 12px;margin-top:8px}
.est-box.est-vazio{background:var(--bg-2);border:1px dashed var(--line);color:var(--text-4);font-size:12px}
.est-tit{font-size:11px;color:var(--blue-2);font-weight:700}
.est-tit span{color:var(--text-4);font-weight:400}
.est-val{display:flex;justify-content:space-between;align-items:baseline;margin-top:3px;font-family:'JetBrains Mono'}
.est-val span{font-size:13px;color:var(--text-3)}
.est-val b{font-size:18px;color:var(--blue-2)}
.est-box.est-baixo{background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.45)}
.est-box.est-baixo .est-tit{color:#f87171}
.est-box.est-baixo .est-val b{color:#f87171}
.est-aviso{margin-top:6px;font-size:12px;font-weight:700;color:#f87171}
/* corte e vinco: aviso + foto do modelo */
.cv-box{margin-top:8px}
.cv-aviso{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);color:#fbbf24;border-radius:10px;padding:9px 12px;font-size:12px;line-height:1.5}
.cv-foto-btn{display:block;text-align:center;margin-top:8px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer}
.cv-thumb{position:relative;margin-top:8px;display:inline-block}
.cv-thumb img{max-width:140px;border-radius:10px;border:1px solid var(--line);display:block}
.cv-rem{position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;background:#ef4444;color:#fff;border:none;font-size:14px;cursor:pointer;line-height:1}
.orcc-acoes{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.orcc-acoes .btn{flex:1;min-width:90px;padding:9px 8px;font-size:13px}
.bt-out{background:transparent;border:1px solid var(--line);color:var(--text-2)}
.bt-del{background:transparent;border:1px solid rgba(239,68,68,.4);color:#f87171}

/* IMPRESSÃO / PDF do orçamento */
#print-orc{display:none}
@media print{
  body > *:not(#print-orc){display:none !important}
  #print-orc{display:block !important;color:#111;font-family:Arial,sans-serif;padding:0}
  .po-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #009FE3;padding-bottom:10px;margin-bottom:14px}
  .po-logo{font-size:24px;font-weight:800;color:#009FE3;letter-spacing:1px}
  .po-meta{text-align:right;font-size:12px;color:#444}
  .po-cli{font-size:14px;margin-bottom:14px}
  .po-tab{width:100%;border-collapse:collapse;font-size:13px}
  .po-tab th{background:#f0f4f8;text-align:left;padding:8px;border-bottom:2px solid #009FE3}
  .po-tab td{padding:8px;border-bottom:1px solid #ddd;vertical-align:top}
  .po-tab .c{text-align:center}
  .po-tab .r{text-align:right;font-family:monospace}
  .po-tab .sub{font-size:10px;color:#888;margin-top:2px}
  .po-tot{text-align:right;font-size:20px;font-weight:800;color:#009FE3;margin-top:14px;border-top:2px solid #009FE3;padding-top:10px}
  .po-obs{margin-top:14px;font-size:12px;background:#f7f7f7;padding:10px;border-radius:6px}
  .po-rod{margin-top:24px;font-size:11px;color:#888;text-align:center;border-top:1px solid #eee;padding-top:10px}
}

/* NOTA / ORÇAMENTO limpo (igual o sistema) */
.modal-card.modal-card-nota{background:#fff;color:#222;padding:0;max-width:520px}
.modal-card-nota .modal-handle{background:#ccc;margin-top:10px}
.nota{font-family:Arial,Helvetica,sans-serif;color:#222;padding:14px 16px}
.nota-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #009FE3;padding-bottom:12px;margin-bottom:14px}
.nota-logo{font-family:'Oswald','Arial Narrow',sans-serif;font-size:22px;font-weight:700;color:#009FE3;letter-spacing:1px}
.nota-sub{font-size:11px;color:#777;margin-top:2px}
.nota-num-lbl{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:1px;text-align:right}
.nota-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#009FE3;text-align:right}
.nota-info{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;font-size:13px}
.nota-cap{font-size:10px;color:#777;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.nota-tab{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px}
.nota-tab th{background:#f4f4f4;border-bottom:2px solid #009FE3;padding:8px;text-align:left}
.nota-tab td{padding:6px 8px;border-bottom:1px solid #eee;vertical-align:top}
.nota-tab .r{text-align:right;font-family:'JetBrains Mono',monospace}
.nota-tot{display:flex;justify-content:flex-end}
.nota-tot-in{min-width:240px;font-size:13px}
.nota-tot-in .ln{display:flex;justify-content:space-between;padding:4px 0}
.nota-tot-in .big{border-top:2px solid #009FE3;padding-top:8px;font-size:16px;font-weight:700;color:#009FE3}
.nota-cond{margin-top:16px;padding-top:12px;border-top:1px solid #eee;font-size:11px;color:#777}
.nota-acoes{display:flex;gap:8px;padding:14px 16px;border-top:1px solid #eee;background:#fafafa;position:sticky;bottom:0}
.nota-acoes .btn{flex:1;padding:11px 8px;font-size:14px}
.btn-out-blue{background:#fff;border:1px solid #009FE3;color:#0284c7}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;display:none;align-items:flex-end;justify-content:center}
.modal.ativo{display:flex}
.modal-card{background:var(--bg-1);width:100%;max-width:460px;border-radius:18px 18px 0 0;padding:18px;padding-bottom:max(18px,env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto}
.modal-card h3{font-size:18px;margin-bottom:4px}
.modal-handle{width:40px;height:4px;background:var(--bg-3);border-radius:2px;margin:0 auto 14px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;color:var(--text-3);font-weight:700;margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--text-1);font-size:15px;font-family:inherit}
.fld textarea{resize:vertical;min-height:60px}
.fld-row{display:flex;gap:8px}
.fld-row .fld{flex:1}
.seg{display:flex;gap:6px;background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:4px}
.seg-btn{flex:1;border:none;background:transparent;color:var(--text-3);font-weight:700;font-size:14px;padding:9px 6px;border-radius:7px;cursor:pointer;font-family:inherit}
.seg-btn.ativo{background:linear-gradient(135deg,#009FE3,#33B5E8);color:#fff}
.cnpj-info{font-size:11px;color:var(--text-4);margin-top:6px;min-height:14px}
.cxbox{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;position:relative}
.cxbox-tit{font-size:12px;font-weight:700;color:var(--blue-2);margin-bottom:8px}
.cxbox-del{position:absolute;top:10px;right:10px;background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3);border-radius:7px;font-size:12px;font-weight:700;padding:4px 9px;cursor:pointer}
.cxbox .fld{margin-bottom:9px}
.cxbox .fld:last-child{margin-bottom:0}
.gram-info{font-size:11px;color:#c084fc;margin-top:5px;min-height:14px;font-weight:700}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#fff;color:#0a0e1a;padding:11px 18px;border-radius:24px;font-weight:700;font-size:13px;z-index:99999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
#toast.err{background:#fca5a5}
#toast.ok{background:#6ee7b7}
.badge{font-family:'JetBrains Mono';font-size:9px;color:#33B5E8;background:rgba(51,181,232,.12);padding:1px 5px;border-radius:3px;border:1px solid rgba(51,181,232,.3)}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="screen active" id="screen-login">
  <div class="login-top">
    <div class="login-jp"><svg viewBox="0 0 100 100"><text x="50" y="65" font-family="Oswald,sans-serif" font-size="42" font-weight="700" text-anchor="middle" fill="#009FE3" letter-spacing="-2">JP</text></svg></div>
    <h1>JP EMBALAGENS</h1>
    <div class="login-cx">CAIXAS DE PAPELÃO</div>
    <p>App do Vendedor · <span class="badge">v2.9.0</span></p>
  </div>
  <div class="login-body">
    <!-- ETAPA A: nomes salvos neste aparelho -->
    <div id="login-step-conhecidos" style="display:none">
      <div style="font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:10px">Quem é você?</div>
      <div id="lista-conhecidos"></div>
      <button class="btn btn-ghost" id="btn-outro-nome" style="width:100%;margin-top:6px">+ Entrar com outro nome</button>
    </div>

    <!-- ETAPA B: login direto (nome + senha) -->
    <div id="login-step-form" style="display:none">
      <div style="font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:12px">Entrar</div>
      <input class="login-input" id="login-nome" type="text" placeholder="Seu nome" autocomplete="username" autocapitalize="words">
      <input class="login-input" id="login-senha" type="password" inputmode="numeric" placeholder="Senha" autocomplete="current-password">
      <button class="btn btn-green" id="btn-entrar" style="width:100%;padding:14px;font-size:16px;margin-top:2px">Entrar</button>
      <button class="btn btn-ghost" id="btn-voltar-conhecidos" style="width:100%;margin-top:8px;display:none">← Voltar</button>
      <div id="login-status" style="text-align:center;color:var(--text-4);font-size:13px;margin-top:14px"></div>
    </div>

    <!-- ETAPA C: senha (teclado) de um nome salvo -->
    <div id="login-step-senha" style="display:none;text-align:center">
      <div class="mot-av" style="margin:0 auto 10px;width:54px;height:54px;font-size:26px">🤝</div>
      <h2 id="senha-nome" style="font-size:20px">—</h2>
      <p style="color:var(--text-3);font-size:13px;margin:6px 0 0">Digite sua senha</p>
      <div class="pin-dots" id="pin-dots"></div>
      <div class="numpad" id="numpad"></div>
      <button class="btn btn-ghost" style="margin-top:18px;width:100%;max-width:300px" id="senha-voltar">← Voltar</button>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="screen" id="screen-app">
  <div class="app-head">
    <div class="av">🤝</div>
    <div>
      <div class="nm" id="app-nome">Vendedor</div>
      <div class="sb" id="app-sub">—</div>
    </div>
    <button class="sair" id="btn-sair">Sair</button>
  </div>
  <div class="wrap">
    <div class="tabs">
      <button class="tab ativo" id="tab-clientes">👥 Clientes</button>
      <button class="tab" id="tab-orcamentos">💰 Meus orçamentos <span class="tab-badge" id="orc-badge" style="display:none">0</span></button>
    </div>
    <div id="vista-clientes">
      <div class="toolbar">
        <input class="busca" id="busca-cli" placeholder="🔍 Buscar cliente...">
        <button class="btn btn-green btn-novo" id="btn-orcamento">➕ Orçamento</button>
      </div>
      <div id="clientes-lista"></div>
    </div>
    <div id="vista-orcamentos" style="display:none">
      <div id="orcamentos-lista"></div>

// Compacta imagem antes de enviar (retorna dataURL base64)
function comprimirImagem(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const MAX = 1280; let w = img.width, h = img.height;
        if(w>MAX||h>MAX){ if(w>h){ h=Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; } }
        const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg',0.7));
      };
      img.onerror = reject; img.src = ev.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

function toast(msg, tipo){ const t=$('toast'); t.textContent=msg; t.className='show'+(tipo?(' '+tipo):''); clearTimeout(t._t); t._t=setTimeout(()=>t.className='',2600); }
function nowIso(){ return new Date().toISOString(); }
function ymd(d){ d=new Date(d); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const norm = s => (s||'').toString().toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');
const fmtDataBR = s => { if(!s) return '—'; const a=String(s).split('-'); return a.length===3?`${a[2]}/${a[1]}/${a[0]}`:s; };
function numPedDe(p){ if(p&&p._numPed!=null&&String(p._numPed).trim()!=='') return String(p._numPed).trim(); const m=(p&&p.obs||'').match(/Ped\s+(\d+)/i); return m?m[1]:''; }

function montarNumpad(){

window.digitarSenha = function(t){

  if(SENHA_BUF.length>=4) return;
  SENHA_BUF += t; renderPinDots();

function validarSenhaConhecido(){

// ===== Derivar fase do pedido (6 fases) =====
const FASES = {
  esperando:  {lbl:'🟡 Esperando programação',  cor:'#fbbf24', bg:'rgba(245,158,11,.18)',  ord:1},
  programado: {lbl:'🟠 Programado',              cor:'#fb923c', bg:'rgba(249,115,22,.18)',  ord:2},
  produzindo: {lbl:'🔵 Produzindo',              cor:'#33B5E8', bg:'rgba(0,159,227,.18)',   ord:3},
  pronto:     {lbl:'🟣 Pronto, aguardando carga',cor:'#c084fc', bg:'rgba(168,85,247,.18)',  ord:4},
  rota:       {lbl:'🟢 Em rota de entrega',      cor:'#6ee7b7', bg:'rgba(16,185,129,.18)',  ord:5},
  entregue:   {lbl:'✅ Entregue',                 cor:'#9ca3af', bg:'rgba(148,163,184,.15)', ord:6}
};

// Cargas que contêm este pedido (por nº do pedido ou cliente)
function cargasDoPedido(p){
  const num = numPedDe(p);
  const cli = norm(p.cliente);
  return CARGAS.filter(c => (c.paletes||[]).some(pal=>{
    if(num && pal.numPed!=null && String(pal.numPed)===num) return true;
    const pc = norm(pal.cliente);
    return cli && pc && (pc.includes(cli)||cli.includes(pc));
  }));
}
// Viagem (escala) que corresponde a uma carga: mesma placa + mesmo dia
function viagemDaCarga(c){
  const placaNorm = norm(c.placa);
  const dt = c.finalizadoEm?new Date(c.finalizadoEm):(c.iniciadoEm?new Date(c.iniciadoEm):null);
  const dia = dt?ymd(dt):null;
  return VIAGENS.find(v => v && norm(v.caminhaoPlaca)===placaNorm && (!dia || v.data===dia) && v.status!=='cancelado') || null;
}
// Motorista marcou o destino deste cliente como entregue?
function entregueViaMotorista(p){
  const cli = norm(p.cliente);
  if(!cli) return false;
  for(const c of cargasDoPedido(p)){
    const v = viagemDaCarga(c);
    if(!v) continue;
    const ent = ENTREGAS[v.id];
    if(!ent || !ent.destinos) continue;
    const destinos = (Array.isArray(v.destinos)&&v.destinos.length)?v.destinos:[{clienteNome:v.clienteNome,destinoLivre:v.destinoLivre}];
    for(let i=0;i<destinos.length;i++){
      const dn = norm(destinos[i].clienteNome||destinos[i].destinoLivre);
      if(dn && (dn.includes(cli)||cli.includes(dn)) && ent.destinos[i] && ent.destinos[i].estado==='entregue') return true;
    }
  }
  return false;
}
// Está numa carga finalizada (carregado / saiu pra rua)?
function emRotaViaCarga(p){
  return cargasDoPedido(p).some(c => c.status==='finalizada' || c.finalizadoEm);
}
function faseDoPedido(p){
  if(p.statusOp==='entregue' || entregueViaMotorista(p)) return 'entregue';
  if(p.statusOp==='carregado' || emRotaViaCarga(p)) return 'rota';
  if(p.statusOp==='pronto_carregar') return 'pronto';
  if(p.statusOp==='em_producao') return 'produzindo';
  if(['programado','reprogramado','bloqueado_financeiro'].includes(p.statusOp)) return 'programado';
  return 'esperando';
}

  }

    const pronto = !!s.orcamento;
    const data = s.criadoEm ? new Date(s.criadoEm).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
    const stCor = pronto ? '#6ee7b7' : '#fbbf24';
    const stBg  = pronto ? 'rgba(16,185,129,.18)' : 'rgba(245,158,11,.18)';
    const stTxt = pronto ? '✅ Orçamento pronto' : '⏳ Aguardando PCP';
    // caixas pedidas
    const caixasArr = Array.isArray(s.caixas)&&s.caixas.length ? s.caixas
      : [{tipoCaixa:s.tipoCaixa,medidaC:s.medidaC,medidaL:s.medidaL,medidaA:s.medidaA,quantidade:s.quantidade}];
    let corpo = '';
    if(pronto){
      const o = s.orcamento;
      corpo = (o.itens||[]).map(it=>{
        const med = [it.C,it.L,it.A].filter(Boolean).join('×');
        return `<div class="orcc-item">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <span><b>${esc(it.ref||'Caixa')}</b>${med?` · ${esc(med)}mm`:''}${it.qtd?` · ${esc(String(it.qtd))} cx`:''}</span>
            <span style="font-family:'JetBrains Mono';color:var(--blue-2);white-space:nowrap">${fmtBRL(it.precoUnit)}/cx</span>
          </div>
          <div style="font-size:11px;color:var(--text-4);margin-top:3px">${[it.chapaCod,it.onda,it.gramatura?it.gramatura+'g':'',it.coluna?it.coluna+'kgf':''].filter(Boolean).join(' · ')} &nbsp;·&nbsp; total ${fmtBRL(it.total)}</div>
        </div>`;
      }).join('');
      corpo += `<div class="orcc-total"><span style="font-size:12px;color:var(--text-3)">Nº ${esc(o.numero||'—')} · validade ${esc(String(o.validade||'—'))} dias</span><span style="font-family:'JetBrains Mono';font-size:18px;font-weight:700;color:var(--blue-2)">${fmtBRL(o.total)}</span></div>`;
    } else {
      corpo = caixasArr.map(c=>{
        const med = [c.medidaC,c.medidaL,c.medidaA].filter(Boolean).join('×');
        const ico = c.estilo==='corte_vinco' ? '✂️' : '📦';
        const foto = c.fotoUrl ? `<a href="${esc(c.fotoUrl)}" target="_blank" rel="noopener" style="color:var(--blue-2);font-size:11px;display:block;margin-top:4px">🖼️ ver modelo</a>` : (c.estilo==='corte_vinco'?`<span style="color:#f87171;font-size:11px;display:block;margin-top:4px">⚠️ sem foto do modelo</span>`:'');
        return `<div class="orcc-item">${ico} <b>${esc(c.tipoCaixa||'Caixa')}</b>${med?` · ${esc(med)}mm`:''}${c.quantidade?` · ${esc(String(c.quantidade))} cx`:''}${foto}</div>`;
      }).join('');
    }
    return `<div class="orcc" style="border-left:3px solid ${stCor}">

// Formata telefone/whatsapp (sem mexer no que estiver fora do padrão)
function fmtFone(v){
  const d=(v||'').replace(/\D/g,'');
  if(!d) return '';
  if(d.length===11) return d.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');
  if(d.length===10) return d.replace(/(\d{2})(\d{4})(\d{4})/,'($1) $2-$3');
  return v;
}

function dadosClienteHtml(c){

  const cidUf = [c.cidade,c.uf].filter(Boolean).join('/');
  const endFull = [end,cidUf].filter(x=>x&&String(x).trim()).join(' · ');

  const linhas = [];
  if(c.cnpj) linhas.push(`<div class="cd-ln">🏢 <span>${esc(c.cnpj)}</span></div>`);

  if(fone) linhas.push(`<div class="cd-ln">📱 <span>${esc(fone)}</span></div>`);

}

// Compensações da onda (mesma lógica do orçamento do PCP) — só pra estimar maleta
const ONDA_CFG = { E:{c:1.5,a:3}, B:{c:3,a:6}, C:{c:4,a:8}, BB:{c:5.8,a:11.6}, BC:{c:6.5,a:13} };
function estimarMaleta(cx){
  const chapa = (CHAPAS||[]).find(c=>c.id===cx.chapaId);
  if(!chapa) return null;
  const k = ONDA_CFG[chapa.onda]; if(!k) return null;
  const rskg = +chapa.precoKgNominal || 0, gram = +chapa.gramaturaTotal || 0;
  const C = +cx.medidaC||0, L = +cx.medidaL||0, A = +cx.medidaA||0, qtd = +cx.quantidade||0;
  if(!rskg || !gram || !C || !L || !A) return null;
  const lap = 50, aba = (L+k.c)/2;
  const chapaC = lap + (C+k.c) + (L+k.c) + (C+k.c) + (L+k.c);
  const chapaL = aba + (A+k.a) + aba;
  const area = chapaC*chapaL/1000000;
  const pesoUnit = area * (gram/1000);          // 🆕 peso por caixa (kg)
  const precoUnit = pesoUnit * rskg;            // 💰 guardado — preço desativado por enquanto
  const pesoTotal = pesoUnit*qtd;
  const pesoMin = +chapa.pesoMinKg || 0;        // mínimo vem do cadastro da chapa
  const abaixoMin = pesoMin > 0 && pesoTotal > 0 && pesoTotal < pesoMin;
  return { precoUnit, total: precoUnit*qtd, pesoUnit, pesoTotal, qtd, pesoMin, abaixoMin };
}
function opcoesChapa(sel){
  const lista = (CHAPAS||[]).slice().sort((a,b)=>(a.codigo||'').localeCompare(b.codigo||''));
  return '<option value="">— sem chapa definida —</option>' + lista.map(c=>{
    const lbl = `${esc(c.codigo||'')} · ${esc(c.onda||'')} · ${c.gramaturaTotal||0}g${c.colunaKgf?` · ${c.colunaKgf}kgf`:''}`;
    return `<option value="${esc(c.id)}" ${c.id===sel?'selected':''}>${lbl}</option>`;
  }).join('');
}
// Caixinha embaixo da quantidade: estimativa (maleta) OU foto do modelo (corte e vinco)
function estBoxHtml(cx){
  if(cx.estilo==='corte_vinco'){
    const temFoto = !!cx.fotoUrl;
    return `<div class="cv-box">
      <div class="cv-aviso">✂️ <b>Corte e vinco:</b> o preço é o PCP que calcula. Envie a <b>foto do modelo</b> da caixa pra eles fazerem.</div>
      <label class="cv-foto-btn">${temFoto?'🔄 Trocar foto do modelo':'📷 Tirar / enviar foto do modelo'}

      </label>
      ${temFoto?`<div class="cv-thumb"><img src="${esc(cx.fotoUrl)}" alt="modelo"><button type="button" class="cv-rem" data-remfoto="${cx.id}">×</button></div>`:''}
    </div>`;
  }
  const est = estimarMaleta(cx);
  if(!est) return `<div class="est-box est-vazio">💡 Escolha a chapa e preencha as medidas pra ver o peso estimado (só maleta).</div>`;
  // 💰 PREÇO DESATIVADO POR ENQUANTO (guardado pra voltar depois — é só descomentar):
  // <div class="est-val"><span>${fmtBRL(est.precoUnit)}/cx</span><b>${fmtBRL(est.total)}</b></div>
  const minTxt = est.pesoMin ? ` · mín ${est.pesoMin.toFixed(0)} kg` : '';
  if(est.abaixoMin){
    return `<div class="est-box est-baixo">
      <div class="est-tit">⚠️ Peso estimado <span>· só maleta${minTxt}</span></div>
      <div class="est-val"><span>${est.pesoUnit.toFixed(3).replace('.',',')} kg/cx</span><b>${est.pesoTotal.toFixed(1).replace('.',',')} kg</b></div>
      <div class="est-aviso">❌ Abaixo do mínimo de produção — aumente a quantidade pra poder enviar.</div>
    </div>`;
  }
  return `<div class="est-box">
    <div class="est-tit">💡 Peso estimado <span>· só maleta · o PCP confirma${minTxt}</span></div>
    <div class="est-val"><span>${est.pesoUnit.toFixed(3).replace('.',',')} kg/cx</span><b>${est.pesoTotal.toFixed(1).replace('.',',')} kg</b></div>
  </div>`;
}

    </div>`;
  }).join('');
  // inputs / selects das caixas

      if(el.dataset.f==='chapaId'){ renderCaixasOrc(); return; }

      const box = document.getElementById('est-'+cx.id);
      if(box) box.innerHTML = estBoxHtml(cx);

  // toggle de estilo (maleta / corte e vinco)
  cont.querySelectorAll('[data-cxe]').forEach(btn=>{

async function uploadFotoCaixa(cxid, file){
  const cx = ORC_CAIXAS.find(c=>c.id===cxid);
  if(!cx || !file) return;
  if(!storage){ toast('Storage indisponível, tente de novo','err'); return; }
  const vid = (SESSAO && SESSAO.id) ? SESSAO.id : 'sem_id';
  toast('📤 Enviando foto...');
  // 1) Compactar a imagem (pode falhar com HEIC do iPhone)
  let dataUrl;
  try {
    dataUrl = await comprimirImagem(file);
  } catch(e){
    console.error('comprimir foto:', e);
    toast('Não consegui ler essa foto (formato?). Tente tirar de novo ou escolher outra.','err');
    return;
  }
  // 2) Enviar pro Storage
  try {
    const ref = storage.ref(`orcamentos_modelos/${vid}/${Date.now()}_${cxid}.jpg`);
    await ref.putString(dataUrl, 'data_url');
    cx.fotoUrl = await ref.getDownloadURL();
    renderCaixasOrc();
    toast('✅ Foto do modelo enviada','ok');
  } catch(e){
    console.error('upload foto:', e);
    const motivo = e && (e.code || e.message) ? (e.code || e.message) : 'erro desconhecido';
    toast('Erro ao enviar foto: ' + motivo, 'err');
  }
}

      coluna: chapa ? (chapa.colunaKgf||0) : 0,
      medidaC: (cx.medidaC||'').trim(),
      medidaL: (cx.medidaL||'').trim(),
      medidaA: (cx.medidaA||'').trim(),
      quantidade: (cx.quantidade||'').trim(),
      fotoUrl: cx.fotoUrl||''
    };
  }).filter(cx => cx.tipoCaixa || cx.descricao || cx.chapaId || cx.medidaC || cx.quantidade);
  if(!caixas.length){ toast('Adicione pelo menos uma caixa (tipo ou descrição)','err'); return; }
  // 🚫 trava: maleta abaixo do peso mínimo da chapa não pode enviar
  const abaixo = ORC_CAIXAS.filter(cx => (cx.estilo||'maleta')!=='corte_vinco')
    .map(cx => { const e = estimarMaleta(cx); return e && e.abaixoMin ? e : null; })
    .filter(Boolean);
  if(abaixo.length){
    toast(`❌ ${abaixo.length} caixa(s) abaixo do peso mínimo de produção. Aumente a quantidade pra enviar.`,'err');
    return;
  }
  // aviso forte: corte e vinco sem foto do modelo (não trava, só avisa)
  const cvSemFoto = caixas.filter(cx => cx.estilo==='corte_vinco' && !cx.fotoUrl);
  if(cvSemFoto.length){
    if(!confirm(`⚠️ ${cvSemFoto.length} caixa(s) corte e vinco estão SEM a foto do modelo.\n\nO PCP precisa do modelo pra fazer essas caixas. Enviar assim mesmo?`)) return;
  }
  const editando = !!ORC_EDIT_ID;
  const orig = editando ? MINHAS_SOLIC.find(x=>x.id===ORC_EDIT_ID) : null;
  const solic = {
    id: editando ? ORC_EDIT_ID : ('sol_' + Date.now() + '_' + Math.random().toString(36).slice(2,7)),
    vendedorId: SESSAO.id,
    vendedorNome: SESSAO.nome,
    cliente,
    cnpj,
    clienteNovo,
    caixas,
    obs: $('orc-obs').value.trim(),
    status: 'nova',                 // ao editar, volta pro PCP refazer
    criadoEm: editando ? (orig?.criadoEm || Date.now()) : Date.now(),
    atualizadoEm: Date.now()
  };
  if(editando) solic.reabertoEm = Date.now(); // marca que foi reenviado
  // (note: orcamento NÃO é copiado → some o preço antigo, PCP refaz)
  // 1) LOCAL primeiro (nunca perde)
  let arr = [];
  try { arr = JSON.parse(localStorage.getItem(PK_SOLIC)||'[]'); } catch(e){ arr = []; }
  arr = arr.filter(s=>s.id!==solic.id); arr.push(solic);
  localStorage.setItem(PK_SOLIC, JSON.stringify(arr));
  $('modal-orc').classList.remove('ativo');
  toast(editando ? '💾 Reenviado pro PCP!' : '📨 Solicitação enviada!','ok');
  if(navigator.vibrate) navigator.vibrate(40);
  ORC_EDIT_ID = null;
  // 2) Nuvem (sem travar)
  enviarSolicNuvem(solic);
};
async function enviarSolicNuvem(solic){
  if(!db) return;
  try {
    const ref = db.collection('jp_sistema').doc('orcamentos_solicitacoes');
    const snap = await ref.get();
    let all = (snap.exists && snap.data().solicitacoes) ? snap.data().solicitacoes : [];
    all = all.filter(s=>s.id!==solic.id); all.push(solic);   // upsert (cria ou substitui)
    await ref.set({ solicitacoes: all, atualizadoEm: firebase.firestore.FieldValue.serverTimestamp() });
    // limpa do buffer local já sincronizado
    try {
      let arr = JSON.parse(localStorage.getItem(PK_SOLIC)||'[]');
      arr = arr.filter(s=>s.id!==solic.id);
      localStorage.setItem(PK_SOLIC, JSON.stringify(arr));
    } catch(e){}
  } catch(e){ console.warn('Solicitação fica local, sincroniza depois:', e.message); }
}
// Excluir orçamento/solicitação (remove da nuvem e do buffer local)
window.excluirOrcamentoVend = async function(id){
  const s = MINHAS_SOLIC.find(x=>x.id===id);
  if(!confirm(`Excluir o orçamento de ${s?.cliente||'—'}?`)) return;
  // local
  try {
    let arr = JSON.parse(localStorage.getItem(PK_SOLIC)||'[]');
    arr = arr.filter(x=>x.id!==id);
    localStorage.setItem(PK_SOLIC, JSON.stringify(arr));
  } catch(e){}
  MINHAS_SOLIC = MINHAS_SOLIC.filter(x=>x.id!==id);
  renderOrcamentos(); atualizarBadgeOrc();
  toast('Orçamento excluído');
  // nuvem
  if(!db) return;
  try {
    const ref = db.collection('jp_sistema').doc('orcamentos_solicitacoes');
    const snap = await ref.get();
    let all = (snap.exists && snap.data().solicitacoes) ? snap.data().solicitacoes : [];
    all = all.filter(x=>x.id!==id);
    await ref.set({ solicitacoes: all, atualizadoEm: firebase.firestore.FieldValue.serverTimestamp() });
  } catch(e){ console.warn('Exclusão sincroniza depois:', e.message); }
};

let ORC_VER_ATUAL = null;

// HTML da nota (mesmo visual do PCP)
function notaOrcHTML(s, o){
  const baseData = o.enviadoEm || s.atualizadoEm || s.criadoEm || Date.now();
  const dataBR = new Date(baseData).toLocaleDateString('pt-BR');
  const validBR = new Date(baseData + (+(o.validade)||5)*86400000).toLocaleDateString('pt-BR');
  const linhas = (o.itens||[]).map((it,i)=>{
    const ehCV = (it.estilo==='corte_vinco') || (!it.estilo && !(+it.A>0));
    const med = ehCV ? [it.C,it.L].filter(Boolean).join('×') : [it.C,it.L,it.A].filter(Boolean).join('×');
    const sub = [estiloLabelIt(it), med?med+' mm':'', it.chapaCod||'', it.onda||'', it.gramatura?it.gramatura+'g':'']
      .filter(Boolean).join(' · ');
    return `<tr>
      <td>${i+1}</td>
      <td><div style="font-weight:600">${esc(it.ref||'Caixa')}</div><div style="font-size:11px;color:#777">${esc(sub)}</div></td>
      <td class="r">${esc(String(it.qtd||''))}</td>
      <td class="r">${fmtBRL(it.precoUnit)}</td>
      <td class="r" style="font-weight:600">${fmtBRL(it.total)}</td>
    </tr>`;
  }).join('');
  const subtotal = (o.itens||[]).reduce((a,it)=>a+(+it.total||0),0);
  const valorIpi = o.semIpi ? 0 : subtotal*((+o.ipi||0)/100);
  const total = (o.total!=null) ? +o.total : subtotal+valorIpi;
  return `
    <div class="nota">
      <div class="nota-head">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:48px;height:48px;background:#009FE3;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <svg viewBox="0 0 100 100" style="width:38px;height:38px"><text x="50" y="68" font-family="Oswald,Arial,sans-serif" font-size="48" font-weight="700" text-anchor="middle" fill="#fff" letter-spacing="-2">JP</text></svg>
          </div>
          <div>
            <div class="nota-logo">JP EMBALAGENS</div>
            <div class="nota-sub">Caixas de Papelão Corrugado · Boracéia/SP</div>
          </div>
        </div>
        <div>
          <div class="nota-num-lbl">Orçamento</div>
          <div class="nota-num">Nº ${esc(o.numero||'—')}</div>
        </div>
      </div>
      <div class="nota-info">
        <div>
          <div class="nota-cap">Cliente</div>
          <div style="font-weight:600;font-size:15px">${esc(s.cliente||'—')}</div>
          ${s.cnpj?`<div style="font-size:12px;color:#555;margin-top:2px">CNPJ: ${esc(s.cnpj)}</div>`:''}
        </div>
        <div style="text-align:right">
          <div class="nota-cap">Emissão / Validade</div>
          <div>${dataBR} · válido até ${validBR}</div>
        </div>
      </div>
      <table class="nota-tab">
        <thead><tr>
          <th style="width:26px">#</th><th>Descrição</th>
          <th class="r" style="width:64px">Qtd</th>
          <th class="r" style="width:84px">Unit.</th>
          <th class="r" style="width:92px">Total</th>
        </tr></thead>
        <tbody>${linhas}</tbody>
      </table>
      <div class="nota-tot"><div class="nota-tot-in">
        <div class="ln"><span>Subtotal</span><span>${fmtBRL(subtotal)}</span></div>
        ${o.semIpi
          ? `<div class="ln" style="color:#777"><span>IPI</span><span>sem IPI</span></div>`
          : `<div class="ln"><span>IPI ${esc(String(o.ipi||0))}%</span><span>${fmtBRL(valorIpi)}</span></div>`}
        ${o.icms!=null?`<div class="ln" style="color:#777;font-size:11px"><span>ICMS ${esc(String(o.icms))}%</span><span>incluso</span></div>`:''}
        <div class="ln big"><span>TOTAL</span><span>${fmtBRL(total)}</span></div>
      </div></div>
      ${s.obs?`<div class="nota-cond"><b>Observação:</b> ${esc(s.obs)}</div>`:''}
      <div class="nota-cond">Condições: ${esc(String(o.validade||5))} dias de validade · Forma de pagamento e prazo de entrega a combinar. Em caso de dúvidas, entre em contato.</div>
    </div>`;
}

// Texto puro pra WhatsApp
function notaOrcTexto(s, o){
  const baseData = o.enviadoEm || s.atualizadoEm || s.criadoEm || Date.now();
  const validBR = new Date(baseData + (+(o.validade)||5)*86400000).toLocaleDateString('pt-BR');
  const itens = (o.itens||[]).map((it,i)=>{
    const ehCV = (it.estilo==='corte_vinco') || (!it.estilo && !(+it.A>0));
    const med = ehCV ? [it.C,it.L].filter(Boolean).join('×') : [it.C,it.L,it.A].filter(Boolean).join('×');
    return `${i+1}. ${it.ref||'Caixa'}\n   ${estiloLabelIt(it)}${med?` · ${med} mm`:''}\n   ${it.qtd||0} un x ${fmtBRL(it.precoUnit)} = ${fmtBRL(it.total)}`;
  }).join('\n\n');
  return `*JP EMBALAGENS*\n_Orçamento Nº ${o.numero||'—'}_\n\n*Cliente:* ${s.cliente||'—'}${s.cnpj?`\n*CNPJ:* ${s.cnpj}`:''}\n*Válido até:* ${validBR}\n\n━━━━━━━━━━━━━━━━\n${itens}\n━━━━━━━━━━━━━━━━\n\n*TOTAL: ${fmtBRL(o.total)}*\n\n_Condições: ${o.validade||5} dias de validade · pagamento e prazo a combinar._`;
}

<script>
(function(){
  var bar, hideT;
  function ensureBar(){
    if(bar) return bar;
    bar = document.createElement('div');
    bar.id = 'jp-net-bar';
    bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:2147483647;text-align:center;font:600 12px/1.45 Inter,Outfit,Arial,sans-serif;padding:7px 12px;transform:translateY(-110%);transition:transform .35s ease;box-shadow:0 2px 12px rgba(0,0,0,.35);letter-spacing:.2px';
    (document.body||document.documentElement).appendChild(bar);
    return bar;
  }
  function show(html,bg,color){ var b=ensureBar(); clearTimeout(hideT); b.innerHTML=html; b.style.background=bg; b.style.color=color; b.style.transform='translateY(0)'; }
  function hide(){ if(bar){ clearTimeout(hideT); bar.style.transform='translateY(-110%)'; } }
  function offline(){ show('\u{1F7E1} Sem internet — salvando no aparelho, sincroniza quando voltar','#f59e0b','#1a1200'); }
  function online(){ show('✅ Reconectado, sincronizando...','linear-gradient(90deg,#00668E,#009FE3)','#fff'); hideT=setTimeout(hide,2600); }
  function init(){ if(navigator.onLine===false) offline(); }
  window.addEventListener('offline', offline);
  window.addEventListener('online', online);
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>
